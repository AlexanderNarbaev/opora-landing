# _data/roadmap.yml — Дорожная карта

- phase: "Фаза 0 — Предзапуск"
  year: "Июль 2026 – Июнь 2027"
  budget: "2 200 млн руб."
  description: >
    Поручение Правительства РФ, регистрация АО «НП „Опора“»,
    формирование межведомственной рабочей группы (ЦБ, Минфин, Минэкономразвития,
    ФНС, Минпромторг), внесение поправок в ст. 149 НК РФ, разработка MVP.
  kpis:
    - Поручение Правительства
    - Регистрация АО
    - Поправки в ГД

- phase: "Фаза 1 — Пилот"
  year: "Июль 2027 – Июнь 2028"
  budget: "1 000 млн руб."
  description: >
    Запуск пилота в Москве и Зеленограде. MVP: Витрина, Кооперация, Песочница.
    Интеграция с ЕСИА, ГИСП, «Честным знаком». Первые 100 брендов.
  kpis:
    - ≥100 верифицированных брендов
    - ≥50 000 пользователей
    - ≥500 000 транзакций
    - SLA ≥ 99.5%

- phase: "Фаза 2 — Масштабирование"
  year: "Июль 2028 – Декабрь 2030"
  budget: "2 200 млн руб."
  description: >
    Запуск модулей «Креаторы», «Право», «Цепочки», «Кадры».
    Миграция баллов в цифровой рубль. Масштабирование на всю страну.
    Интеграция с платформами ЦФА.
  kpis:
    - ≥200 000 брендов
    - ≥8 млн пользователей
    - Капитализация 50 млрд руб.

- phase: "Фаза 3 — Международное развитие"
  year: "2031+"
  budget: "800 млн руб."
  description: >
    Экспорт модели в ЕАЭС и БРИКС. Пилот в Беларуси и Казахстане (2031),
    выход в Китай и Индию через BRICS Bridge. White-label решение
    «Опора International» для стран-партнёров.
  kpis:
    - 10 000 брендов за рубежом
    - 5 стран присутствия
    - Капитализация 250+ млрд руб.
