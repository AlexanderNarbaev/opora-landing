  features:
    - Нулевая комиссия на старте
    - Автоматическое формирование чеков
    - Интеграция с «Мой налог» (ФНС)
    - Вывод из тени для 8+ млн самозанятых

- id: chains
  name: Опора.Цепочки
  icon: link
  color: "#78909C"
  color_class: module-chains
  status: BUILD
  description: >
    B2B-закупки, блокчейн-прослеживаемость товаров от сырья до прилавка,
    AI-ранжирование поставщиков для крупных тендеров.
  features:
    - B2B-тендеры с AI-ранжированием
    - Блокчейн-прослеживаемость каждой единицы товара
    - Интеграция с ГИСП и «Честным знаком»
    - Критически важно для экспортёров

- id: personnel
  name: Опора.Кадры
  icon: people
  color: "#7E57C2"
  color_class: module-personnel
  status: BUILD
  description: >
    Платформа для найма и верификации компетенций,
