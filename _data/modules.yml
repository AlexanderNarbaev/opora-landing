- id: export
  name: Опора.Экспорт
  icon: globe
  color: "#1565C0"
  color_class: module-export
  status: BUILD
  description: >
    «Единое окно» для выхода на рынки ЕАЭС и БРИКС: предэкспортная подготовка,
