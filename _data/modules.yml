# _data/modules.yml — 17 модулей платформы «Опора»

- id: vitrina
  name: Опора.Витрина
  icon: shield
  color: "#233370"
  color_class: module-vitrina
  status: STUB
  description: >
    Каталог верифицированных российских брендов с трёхуровневым грейдированием
    «Золото / Серебро / Бронза», кешбэком до 7%, социальным треком и инструментами
    обратной связи для брендов.
  features:
    - Грейдирование брендов по уровню локализации
    - Кешбэк до 7% (3% государство + до 4% бизнес)
    - Социальный трек — трата баллов на образование, медицину, спорт
    - Амбассадорская программа для активных покупателей

- id: cooperation
  name: Опора.Кооперация
  icon: gears
  color: "#2EC4B6"
  color_class: module-cooperation
  status: STUB
  description: >
    AI-подбор производственных партнёров по 50+ параметрам, артельные кластеры
    для выполнения крупных заказов, B2B-тендеры и смарт-контракты.
  features:
    - AI-подбор партнёров по мощностям, логистике, специализации
    - Артельные кластеры — объединение МСП под крупный заказ
    - B2B-тендеры с AI-ранжированием
    - Смарт-контракты на Hyperledger Fabric

- id: creators
  name: Опора.Креаторы
  icon: brush
  color: "#4CAF76"
  color_class: module-creators
  status: STUB
  description: >
    Маркетплейс для самозанятых: дизайнеры, копирайтеры, маркетологи, видеографы.
    Нулевая комиссия на старте, интеграция с «Мой налог».
  features:
    - AI-подбор исполнителя по портфолио и рейтингу
    - Смарт-контракт с автоматическим NDA
    - 0% комиссии для самозанятых
    - Интеграция с «Мой налог»

- id: analytics
  name: Опора.Аналитика
  icon: chart
  color: "#667085"
  color_class: module-analytics
  status: STUB
  description: >
    Встроенная CRM/CDP-система: портрет покупателя, прогноз спроса, сегментация.
    Data Monetization — пассивный доход гражданам за обезличенные данные.
  features:
    - CRM/CDP для малого бизнеса
    - Прогноз спроса (Temporal Fusion Transformer)
    - Data Monetization — доход баллами за данные
    - Витрины данных для брендов через API

- id: legal
  name: Опора.Право
  icon: scales
  color: "#C62828"
  color_class: module-legal
  status: STUB
  description: >
    Арбитраж, патентный маркетплейс, типовые смарт-контракты с NDA.
    Франчайзинг-маркетплейс со стандартным мораторием на конкуренцию.
  features:
    - Арбитраж на базе Коллегии РСПП
    - Патентный маркетплейс с блокчейн-учётом роялти
    - Типовые NDA в смарт-контрактах
    - Франчайзинг-маркетплейс

- id: finance
  name: Опора.Финансы
  icon: coin
  color: "#F9A825"
  color_class: module-finance
  status: BUILD
  description: >
    Краудфандинг 2.0: токены участия, интеграция с ЦФА-платформами,
    привлечение инвестиций в проекты МСП от частных лиц до венчурных фондов.
  features:
    - Краудфандинг через ЦФА (интеграция с 20+ операторами)
    - Токены участия для инвесторов
    - Объём рынка ЦФА: 170 млрд руб. (I кв. 2026)
    - Смарт-контракты на цифровом рубле

- id: sandbox
  name: Опора.Песочница
  icon: sprout
  color: "#D7CCC8"
  color_class: module-sandbox
  status: STUB
  description: >
    Среда для самозанятых и микробизнеса: нулевая комиссия,
