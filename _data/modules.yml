    - Интеграция с вузами и колледжами
    - HR-инструменты для МСП без бюджета на рекрутинг
    - Цифровое портфолио специалиста

- id: regions
  name: Опора.Регионы
  icon: map
  color: "#FF8A65"
  color_class: module-regions
  status: BUILD
  description: >
    Геотаргетированная поддержка моногородов, приграничных территорий
