<header class="site-header" role="banner">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Опора — на главную">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="Опора" width="32" height="32">
      <span class="logo-text">ОПОРА</span>
    </a>

    <nav class="site-nav" role="navigation" aria-label="Основная навигация">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>
          {{ item.title }}
        </a>
      {% endfor %}
    </nav>

    <button class="nav-toggle" aria-label="Меню" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav class="mobile-nav" aria-label="Мобильная навигация">
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.querySelector('.nav-toggle');
  var mobileNav = document.querySelector('.mobile-nav');
  var header = document.querySelector('.site-header');

  toggle.addEventListener('click', function() {
    var expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    this.classList.toggle('open');
    mobileNav.classList.toggle('open');
    header.classList.toggle('nav-open');
  });

  // Close on link click
  mobileNav.querySelectorAll('a').forEach(function(link) {
    link.addEventListener('click', function() {
      toggle.classList.remove('open');
      mobileNav.classList.remove('open');
      header.classList.remove('nav-open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });
});
</script>
